services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - workspaces_data:/app/workspaces
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USERNAME:-pulpy}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pulpy123}
      POSTGRES_DB: ${DB_NAME:-pulpy}
    ports:
      - "${DB_PORT:-5555}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-pulpy}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  workspaces_data:
