<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artifact Sandbox</title>

  <!-- React 18 (load BEFORE Tailwind to avoid module pollution) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- prop-types (required by Recharts UMD) -->
  <script crossorigin src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>

  <!-- Recharts -->
  <script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>

  <!-- Lucide React — CDN UMD has persistent module detection issues,
       so we create a Proxy that generates simple SVG icon components on-the-fly.
       Any property access (e.g. LucideReact.TrendingUp) returns a valid React component. -->
  <script>
    (function() {
      // Small inline SVG icons for common dashboard icons
      var KNOWN = {
        TrendingUp: 'M23 6l-9.5 9.5-5-5L1 18',
        TrendingDown: 'M23 18l-9.5-9.5-5 5L1 6',
        ArrowUp: 'M12 19V5m-7 7l7-7 7 7',
        ArrowDown: 'M12 5v14m7-7l-7 7-7-7',
        DollarSign: 'M12 1v22m5-18H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H7',
        Users: 'M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8m13 10v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75',
        Activity: 'M22 12h-4l-3 9L9 3l-3 9H2',
        ShoppingCart: 'M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6',
        Calendar: 'M19 4H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V6a2 2 0 00-2-2m-3-2v4m-8-4v4m-5 4h18',
        BarChart3: 'M18 20V10m-6 10V4M6 20v-6',
        Target: 'M12 22a10 10 0 100-20 10 10 0 000 20zm0-6a4 4 0 100-8 4 4 0 000 8zm0-2a2 2 0 100-4 2 2 0 000 4z',
        Filter: 'M22 3H2l8 9.46V19l4 2v-8.54L22 3',
        Search: 'M11 19a8 8 0 100-16 8 8 0 000 16zm10 2l-4.35-4.35',
        Download: 'M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4m4-5l5 5 5-5m-5 5V3',
        RefreshCw: 'M23 4v6h-6M1 20v-6h6m-.87-2.36A9 9 0 0122.36 10M1.64 14A9 9 0 0017.87 18.36',
      };
      var fallbackPath = 'M12 2a10 10 0 100 20 10 10 0 000-20z';

      function makeIcon(name) {
        var pathD = KNOWN[name] || fallbackPath;
        return React.forwardRef(function(props, ref) {
          var size = props.size || props.width || 24;
          var cn = props.className || '';
          return React.createElement('svg', {
            ref: ref,
            xmlns: 'http://www.w3.org/2000/svg',
            width: size, height: size,
            viewBox: '0 0 24 24',
            fill: 'none',
            stroke: 'currentColor',
            strokeWidth: 2,
            strokeLinecap: 'round',
            strokeLinejoin: 'round',
            className: cn,
          }, React.createElement('path', { d: pathD }));
        });
      }

      // Proxy: any property access returns a valid icon component
      window.LucideReact = new Proxy({}, {
        get: function(target, name) {
          if (typeof name !== 'string') return undefined;
          if (!target[name]) target[name] = makeIcon(name);
          return target[name];
        }
      });
      console.log('[sandbox] Lucide shim installed (Proxy-based)');
    })();
  </script>

  <!-- Tailwind CSS (loads LAST among libs — its IIFE can leak module/exports/require) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Babel Standalone for JSX transpilation -->
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; overflow: auto; }
    #root { min-height: 100vh; }
    #error-display { display: none; padding: 24px; font-family: monospace; }
    #error-display.visible { display: block; }
    #error-display pre {
      background: #1e1e2e;
      color: #f38ba8;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      white-space: pre-wrap;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="error-display">
    <p style="color: #cdd6f4; margin-bottom: 12px; font-family: sans-serif;">Dashboard failed to render:</p>
    <pre id="error-message"></pre>
  </div>

  <script>
    // ============================================================
    // SANDBOX RENDERER
    // ============================================================

    console.log('[sandbox] React:', typeof React !== 'undefined' ? 'OK v' + React.version : 'MISSING');
    console.log('[sandbox] ReactDOM:', typeof ReactDOM !== 'undefined' ? 'OK' : 'MISSING');
    console.log('[sandbox] Recharts:', typeof Recharts !== 'undefined' ? 'OK' : 'MISSING');
    console.log('[sandbox] Babel:', typeof Babel !== 'undefined' ? 'OK' : 'MISSING');

    var lucideLib = window.LucideReact || {};
    console.log('[sandbox] Lucide: OK (Proxy shim)');

    const SCOPE = {
      'react': typeof React !== 'undefined' ? React : {},
      'recharts': typeof Recharts !== 'undefined' ? Recharts : {},
      'lucide-react': lucideLib,
    };

    let currentRoot = null;

    window.addEventListener('message', (event) => {
      const data = event.data || {};
      if (data.type === 'RENDER_ARTIFACT') {
        console.log('[sandbox] RENDER_ARTIFACT received, code length:', data.code?.length);
        renderCode(data.code, data.id);
      }
    });

    function renderCode(jsxCode, requestId) {
      const rootEl = document.getElementById('root');
      const errorDisplay = document.getElementById('error-display');
      const errorMessage = document.getElementById('error-message');

      // Reset
      errorDisplay.className = '';
      rootEl.style.display = 'block';

      try {
        let processedCode = jsxCode;

        // Step 0: Auto-fix common JSX issues

        // Fix <style> tags with bare CSS (should be <style>{`...`}</style>)
        processedCode = processedCode.replace(
          /<style>\s*\n?([\s\S]*?)\n?\s*<\/style>/g,
          function(match, css) {
            // Already wrapped in {`...`} or { template literal }
            if (css.trim().startsWith('{')) return match;
            return '<style>{`' + css + '`}</style>';
          }
        );

        // Step 1: Extract and rewrite import statements
        const importRegex = /import\s+(?:(\w+)(?:\s*,\s*)?)?(?:\{([^}]*)\})?\s+from\s+['"]([^'"]+)['"]\s*;?/g;
        const imports = [];
        processedCode = processedCode.replace(importRegex, (match, defaultImport, namedImports, source) => {
          imports.push({ defaultImport, namedImports, source });
          return '';
        });

        // Build scope assignments
        // IMPORTANT: use "var" not "const" to avoid conflicts with Function params
        let scopeSetup = '';
        for (const imp of imports) {
          const scopeObj = '__SCOPE__["' + imp.source + '"]';

          if (imp.source === 'react') {
            // Skip default import — React is already passed as a Function parameter.
            // Only destructure named imports.
            if (imp.namedImports) {
              const names = imp.namedImports.split(',').map(function(n) { return n.trim(); }).filter(Boolean);
              for (const name of names) {
                const parts = name.split(/\s+as\s+/).map(function(s) { return s.trim(); });
                const original = parts[0];
                const alias = parts[1] || original;
                scopeSetup += 'var ' + alias + ' = React.' + original + ';\n';
              }
            }
          } else if (SCOPE[imp.source]) {
            if (imp.defaultImport) {
              scopeSetup += 'var ' + imp.defaultImport + ' = ' + scopeObj + ';\n';
            }
            if (imp.namedImports) {
              const names = imp.namedImports.split(',').map(function(n) { return n.trim(); }).filter(Boolean);
              for (const name of names) {
                const parts = name.split(/\s+as\s+/).map(function(s) { return s.trim(); });
                const original = parts[0];
                const alias = parts[1] || original;
                scopeSetup += 'var ' + alias + ' = ' + scopeObj + '.' + original + ' || ' + scopeObj + '["' + original + '"];\n';
              }
            }
          }
        }

        // Step 2: Handle export default
        processedCode = processedCode.replace(
          /export\s+default\s+function\s+(\w+)/,
          'function $1'
        );
        processedCode = processedCode.replace(
          /export\s+default\s+/,
          'var __DEFAULT_EXPORT__ = '
        );

        // Find the last top-level function name as fallback
        const funcMatches = processedCode.match(/function\s+(\w+)\s*\(/g);
        let lastFunc = null;
        if (funcMatches) {
          const m = funcMatches[funcMatches.length - 1].match(/function\s+(\w+)/);
          if (m) lastFunc = m[1];
        }

        // Step 3: Transpile JSX with Babel
        console.log('[sandbox] Transpiling...');
        var transpiled = Babel.transform(scopeSetup + processedCode, {
          presets: ['react'],
          filename: 'dashboard.jsx',
        }).code;

        console.log('[sandbox] Transpile OK');

        // Step 4: Evaluate and get component
        var fullCode =
          transpiled +
          '\nreturn typeof __DEFAULT_EXPORT__ !== "undefined" ? __DEFAULT_EXPORT__ : ' +
          (lastFunc || 'null') + ';';

        var Component = new Function('React', 'Recharts', '__SCOPE__', fullCode)(
          React, Recharts, SCOPE
        );

        if (!Component) {
          throw new Error('No component found. Make sure you have "export default function ..."');
        }

        // Step 5: Render
        console.log('[sandbox] Rendering:', Component.name || 'anonymous');
        if (currentRoot) {
          currentRoot.unmount();
        }
        currentRoot = ReactDOM.createRoot(rootEl);
        currentRoot.render(React.createElement(Component));

        // Step 6: Notify parent of success
        window.parent.postMessage({
          type: 'RENDER_SUCCESS',
          id: requestId,
        }, '*');
        console.log('[sandbox] RENDER_SUCCESS');

      } catch (err) {
        console.error('[sandbox] ERROR:', err);

        rootEl.style.display = 'none';
        errorDisplay.className = 'visible';
        errorMessage.textContent = err.message +
          (err.stack ? '\n\n' + err.stack.split('\n').slice(0, 5).join('\n') : '');

        window.parent.postMessage({
          type: 'RENDER_ERROR',
          id: requestId,
          error: err.message,
        }, '*');
      }
    }

    // Notify parent that sandbox is ready
    window.parent.postMessage({ type: 'SANDBOX_READY' }, '*');
    console.log('[sandbox] SANDBOX_READY posted');
  </script>
</body>
</html>
